name: finance-pi

services:
  # ========== PROXY INVERSO (ascolta porta 80) ==========
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: finance_nginx_proxy
    restart: unless-stopped
    ports:
      # Ascolta su porta 80 (rete locale)
      - "${PI_LOCAL_IP:-127.0.0.1}:80:80"
    volumes:
      - ./docker/nginx-proxy/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nginx
    networks:
      - finance
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  nginx:
    image: nginx:1.27-alpine
    container_name: finance_nginx_pi
    restart: unless-stopped
    ports:
      # ⚠️ Binding SOLO a localhost (il proxy lo raggiunge internamente)
      - "127.0.0.1:${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - node
    networks:
      - finance
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  php:
    build:
      context: ./docker/php
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: finance_php_pi
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html:cached
    environment:
      PHP_IDE_CONFIG: "serverName=finance"
      PHP_MEMORY_LIMIT: "256M"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  node:
    build:
      context: ./frontend
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: finance_node_pi
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: "http://${PI_LOCAL_IP:-localhost}:${APP_PORT:-8080}/api"
      NODE_OPTIONS: "--max-old-space-size=512"
    expose:
      - "5173"
    networks:
      - finance
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  mysql:
    image: mysql:8.4
    container_name: finance_mysql_pi
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-finance}
      MYSQL_USER: ${DB_USERNAME:-finance}
      MYSQL_PASSWORD: ${DB_PASSWORD:-finance}
    ports:
      # Binding solo a localhost per sicurezza
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      # Montare volume su SSD esterno: /mnt/ssd/mysql_data
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finance
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: finance_redis_pi
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      # Montare volume su SSD esterno: /mnt/ssd/redis_data
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finance
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 256M

volumes:
  mysql_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MYSQL_DATA_PATH:-/mnt/ssd/mysql_data}
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${REDIS_DATA_PATH:-/mnt/ssd/redis_data}

networks:
  finance:
    driver: bridge
