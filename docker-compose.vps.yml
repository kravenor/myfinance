name: finance-vps

# Stack produzione per VPS dietro Apache (reverse proxy + TLS sull'host).
# nginx ascolta solo su 127.0.0.1:${APP_PORT:-8080}; Apache proxa il dominio pubblico.
# Richiede .env.production (vedi .env.production.example) e le variabili DB_* nell'ambiente/.env.

services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
    container_name: finance_vps_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    volumes:
      - laravel_app:/var/www/html:ro
    depends_on:
      - php
    networks:
      - finance

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: finance_vps_php
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - laravel_app:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: finance_vps_scheduler
    restart: unless-stopped
    env_file: .env.production
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - laravel_app:/var/www/html
    depends_on:
      php:
        condition: service_started
    networks:
      - finance

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: finance_vps_queue
    restart: unless-stopped
    env_file: .env.production
    command: ["php", "artisan", "queue:work", "--tries=3", "--max-time=3600"]
    volumes:
      - laravel_app:/var/www/html
    depends_on:
      php:
        condition: service_started
    networks:
      - finance

  mysql:
    image: mysql:8.4
    container_name: finance_vps_mysql
    restart: unless-stopped
    environment:
      # Nessun default: il compose fallisce se le variabili mancano (niente password di fabbrica online).
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:?set DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME:?set DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finance

  redis:
    image: redis:7-alpine
    container_name: finance_vps_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finance

volumes:
  mysql_data:
  redis_data:
  laravel_app:

networks:
  finance:
    driver: bridge
