# docker/nginx-proxy/proxy.conf
# Proxy inverso per routing domini locali
# Reindirizza il traffico verso gli applicativi basato sul dominio

upstream finance {
    server finance_nginx_pi:80;
}

upstream app2 {
    server app2_nginx:80;
}

# Aggiungi qui altri upstream per app3, app4, ecc.
# upstream app3 {
#     server app3_nginx:80;
# }

# ============ SERVER DI FALLBACK ============
# Richieste senza host valido
server {
    listen 80 default_server;
    server_name _;

    location / {
        return 404 "Applicazione non trovata.\nDomini validi: finance.local, app2.local\n";
    }
}

# ============ FINANCE ============
server {
    listen 80;
    server_name finance.local;

    location / {
        proxy_pass http://finance;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout (Laravel può essere lento su Pi)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ============ APP 2 (template) ============
# Sostituisci "app2" con il nome del tuo secondo applicativo
server {
    listen 80;
    server_name app2.local;

    location / {
        proxy_pass http://app2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

