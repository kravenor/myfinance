name: finance-prod

services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
    container_name: finance_prod_nginx
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.finance.rule=Host(`finance.pi.local`)
      - traefik.http.services.finance.loadbalancer.server.port=80
    volumes:
      - laravel_app:/var/www/html:ro
    depends_on:
      - php
    networks:
      - finance
      - proxy

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: finance_prod_php
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - laravel_app:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - finance

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: finance_prod_scheduler
    restart: unless-stopped
    env_file: .env.production
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - laravel_app:/var/www/html
    depends_on:
      php:
        condition: service_started
    networks:
      - finance

  mysql:
    image: mysql:8.4
    container_name: finance_prod_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finance

  redis:
    image: redis:7-alpine
    container_name: finance_prod_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - finance

volumes:
  mysql_data:
  redis_data:
  laravel_app:

networks:
  finance:
    driver: bridge
  proxy:
    external: true
