name: finance

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: finance_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - node
    networks:
      - finance

  php:
    build:
      context: ./docker/php
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: finance_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html:cached
    environment:
      PHP_IDE_CONFIG: "serverName=finance"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance

  node:
    build:
      context: ./frontend
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: finance_node
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: "http://localhost:${APP_PORT:-8080}/api"
    expose:
      - "5173"
    networks:
      - finance

  mysql:
    image: mysql:8.4
    container_name: finance_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-finance}
      MYSQL_USER: ${DB_USERNAME:-finance}
      MYSQL_PASSWORD: ${DB_PASSWORD:-finance}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finance

  redis:
    image: redis:7-alpine
    container_name: finance_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finance

volumes:
  mysql_data:
  redis_data:

networks:
  finance:
    driver: bridge
